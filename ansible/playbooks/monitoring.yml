# =============================================================================
# FILE: playbooks/monitoring.yml
# PURPOSE: Playbook for all monitoring VMs (Grafana and Nagios).
# =============================================================================

---
# -----------------------------------------------------------------------------
# PLAY 1: Grafana VM
# -----------------------------------------------------------------------------
- name: Configure Grafana VM
  hosts: grafana
  become: true
  roles:
    - grafana

# -----------------------------------------------------------------------------
# PLAY 2: Nagios VM
# -----------------------------------------------------------------------------
- name: Configure Nagios VM
  hosts: nagios
  become: true
  roles:
    - nagios
